<style>
:root{
  --bg:#07090f;--surface:#0d1117;--card:#121620;--border:#1c2333;--border2:#232f45;
  --orange:#f97316;--orange2:#c2410c;

  --radius-sm:8px;--radius-md:12px;--radius-lg:16px;
  --transition:all .2s ease;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter','Segoe UI',Tahoma,sans-serif;overflow:hidden;height:100vh;font-size:15px;font-weight:400;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
::-webkit-scrollbar{width:6px;height:6px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:#2a3550;border-radius:3px;}::-webkit-scrollbar-thumb:hover{background:#3b4f70;}
*{scrollbar-width:thin;scrollbar-color:#2a3550 var(--surface);}
input,select,button{font-family:inherit;}
input[type=date]::-webkit-calendar-picker-indicator,input[type=month]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:0.7;cursor:pointer;}input[type=month]::-webkit-calendar-picker-indicator:hover{opacity:1;}
input[type=number]::-webkit-inner-spin-button{opacity:.3;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes kpPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.14)}}

@keyframes starFloat3{0%,100%{transform:translate(0,0) scale(1);opacity:0.6}50%{transform:translate(-12px,-10px) scale(1.2);opacity:1}}

.kp-badge-group{animation:kpPulse 2.2s ease-in-out infinite,kpBadgeGlow 2.2s ease-in-out infinite;transform-box:fill-box;transform-origin:center;}

:focus-visible{outline:2px solid var(--orange);outline-offset:2px;border-radius:4px;}
button:focus-visible{outline:2px solid var(--orange);outline-offset:2px;}

.card{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm);}

.sc:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}

.mo-bg{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(8px);}
.mo-box{background:var(--card);border-radius:var(--radius-lg);padding:28px;width:100%;max-width:500px;box-shadow:var(--shadow-lg);}
table{width:100%;border-collapse:collapse;font-size:14px;}
th{padding:9px 12px;font-weight:600;font-size:11px;letter-spacing:.8px;white-space:nowrap;text-transform:uppercase;}
td{padding:9px 12px;border-bottom:1px solid var(--border);white-space:nowrap;font-weight:400;}
.mn{font-family:'Courier New',monospace;}
.tst{position:fixed;bottom:20px;right:20px;z-index:999;padding:12px 18px;border-radius:var(--radius-sm);font-weight:700;font-size:14px;color:#fff;pointer-events:none;box-shadow:var(--shadow-md);display:flex;align-items:center;gap:8px;}

/* ===== KRUSHNNAL ULTRA PREMIUM — GENUINE ADVANCE REDESIGN v3 ===== */

/* ── Google Fonts ── */
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap');

/* ── Root Tokens ── */
:root{
  /* Deep space dark base */
  --kp-bg0:#050810;
  --kp-bg1:#080c18;
  --kp-bg2:#0c1222;

  /* Glass surfaces */
  --kp-glass:rgba(14,20,38,.82);
  --kp-glass2:rgba(10,15,28,.90);
  --kp-glass-border:rgba(255,255,255,.055);
  --kp-glass-border2:rgba(255,255,255,.10);

  /* Brand oranges */
  --kp-fire:#ff6b2b;
  --kp-fire2:#f97316;
  --kp-fire3:#fb923c;
  --kp-fire-dim:rgba(255,107,43,.18);
  --kp-fire-glow:rgba(255,107,43,.35);

  /* Accent palette */
  --kp-emerald:#10d98e;
  --kp-sapphire:#3b9eff;
  --kp-amber:#f5a623;
  --kp-crimson:#ff4d6d;
  --kp-violet:#8b5cf6;

  /* Shadows */
  --kp-shadow-sm:0 2px 8px rgba(0,0,0,.45);
  --kp-shadow-md:0 6px 24px rgba(0,0,0,.55),0 2px 8px rgba(0,0,0,.3);
  --kp-shadow-lg:0 16px 48px rgba(0,0,0,.65),0 4px 16px rgba(0,0,0,.4);
  --kp-shadow-fire:0 8px 32px rgba(255,107,43,.30),0 0 64px rgba(255,107,43,.12);

  /* Typography */
  --kp-font:'Sora','Inter',sans-serif;
  --kp-mono:'JetBrains Mono','Courier New',monospace;

  /* Timing */
  --kp-ease:cubic-bezier(.32,.72,0,1);
  --kp-spring:cubic-bezier(.175,.885,.32,1.275);
}

/* ── Body: layered cosmic background ── */
body{
  font-family:var(--kp-font)!important;
  background:
    radial-gradient(ellipse 70% 50% at 85% 10%, rgba(255,107,43,.09) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 5% 90%, rgba(59,158,255,.07) 0%, transparent 60%),
    radial-gradient(ellipse 80% 60% at 50% 50%, rgba(139,92,246,.04) 0%, transparent 70%),
    linear-gradient(168deg,#050810 0%,#08101e 40%,#060c16 100%)!important;
  overflow-x:hidden;
}

/* ── Cursor glow — bigger & smoother ── */
body::before{
  content:'';
  position:fixed;
  width:380px;height:380px;
  left:var(--mx,50%);top:var(--my,50%);
  transform:translate(-50%,-50%);
  background:radial-gradient(circle,
    rgba(255,107,43,.08) 0%,
    rgba(255,107,43,.04) 35%,
    transparent 70%);
  pointer-events:none;
  z-index:1;
  transition:left .12s ease,top .12s ease;
}

/* ── Ambient grid overlay ── */
body::after{
  content:'';
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
  z-index:0;
  mask-image:radial-gradient(ellipse 100% 100% at 50% 0%, black 20%, transparent 80%);
}

/* ── Sidebar — frosted glass ── */
.desk-sidebar{
  background:linear-gradient(180deg,
    rgba(10,14,24,.95) 0%,
    rgba(8,11,20,.98) 100%)!important;
  backdrop-filter:blur(28px) saturate(1.4);
  -webkit-backdrop-filter:blur(28px) saturate(1.4);
  border-right:1px solid rgba(255,255,255,.06)!important;
  box-shadow:
    4px 0 32px rgba(0,0,0,.5),
    inset -1px 0 0 rgba(255,255,255,.04)!important;
  position:relative;
  z-index:10;
}

/* ── Cards — genuine glass morphism ── */
.card,.sc{
  background:linear-gradient(
    145deg,
    rgba(18,25,45,.88) 0%,
    rgba(12,18,32,.92) 50%,
    rgba(9,13,25,.94) 100%
  )!important;
  border:1px solid rgba(255,255,255,.07)!important;
  backdrop-filter:blur(20px) saturate(1.3);
  -webkit-backdrop-filter:blur(20px) saturate(1.3);
  box-shadow:
    0 8px 32px rgba(0,0,0,.4),
    0 2px 8px rgba(0,0,0,.3),
    inset 0 1px 0 rgba(255,255,255,.06),
    inset 0 -1px 0 rgba(0,0,0,.2)!important;
  transition:transform .3s var(--kp-ease),
             box-shadow .3s var(--kp-ease),
             border-color .3s var(--kp-ease)!important;
  position:relative;
  overflow:hidden;
}

/* Shimmer line at top */
.card::before,.sc::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,
    transparent 0%,
    rgba(255,107,43,.4) 20%,
    rgba(255,180,100,.6) 50%,
    rgba(255,107,43,.4) 80%,
    transparent 100%);
  opacity:0;
  transition:opacity .3s;
}

.card:hover::before,.sc:hover::before{opacity:1;}

/* Card hover — lift with fire glow */
.card:hover,.sc:hover{
  transform:translateY(-5px) scale(1.005)!important;
  border-color:rgba(255,107,43,.35)!important;
  box-shadow:
    0 20px 60px rgba(0,0,0,.5),
    0 4px 16px rgba(0,0,0,.35),
    0 0 0 1px rgba(255,107,43,.18),
    0 0 40px rgba(255,107,43,.12),
    inset 0 1px 0 rgba(255,255,255,.08)!important;
}

/* ── Nav buttons ── */
.nb{
  font-family:var(--kp-font)!important;
  font-weight:600!important;
  font-size:12.5px!important;
  border-radius:10px!important;
  border:1px solid transparent!important;
  transition:
    background .2s var(--kp-ease),
    transform .2s var(--kp-spring),
    border-color .2s,
    color .2s,
    box-shadow .2s!important;
  letter-spacing:.01em;
  padding:10px 12px!important;
}

.nb:hover{
  background:rgba(255,107,43,.09)!important;
  border-color:rgba(255,107,43,.25)!important;
  color:#fff!important;
  transform:translateX(5px)!important;
  box-shadow:inset 0 0 20px rgba(255,107,43,.05)!important;
}

.nb.act{
  background:linear-gradient(135deg,#c43f0a,#f97316,#fb923c)!important;
  border-color:rgba(255,150,80,.4)!important;
  color:#fff!important;
  box-shadow:
    0 6px 20px rgba(255,107,43,.35),
    inset 0 1px 0 rgba(255,255,255,.2)!important;
  transform:none!important;
}

/* ── Primary button ── */
.btn-or{
  font-family:var(--kp-font)!important;
  font-weight:700!important;
  background:linear-gradient(135deg,#b83d0a 0%,#f97316 55%,#fb923c 100%)!important;
  border:none!important;
  box-shadow:
    0 6px 20px rgba(255,107,43,.30),
    0 2px 6px rgba(255,107,43,.20),
    inset 0 1px 0 rgba(255,255,255,.18)!important;
  letter-spacing:.02em;
  position:relative;
  overflow:hidden;
  transition:
    transform .22s var(--kp-spring),
    box-shadow .22s var(--kp-ease)!important;
}

.btn-or::after{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(105deg,rgba(255,255,255,.16) 0%,transparent 40%);
  pointer-events:none;
}

.btn-or:hover{
  transform:translateY(-3px) scale(1.03)!important;
  box-shadow:
    0 12px 35px rgba(255,107,43,.42),
    0 4px 12px rgba(255,107,43,.25),
    inset 0 1px 0 rgba(255,255,255,.2)!important;
}

.btn-or:active{transform:translateY(-1px) scale(.99)!important;}

/* ── Small buttons ── */
.bsm{
  font-family:var(--kp-font)!important;
  font-weight:700!important;
  border-radius:9px!important;
  transition:transform .18s var(--kp-spring),box-shadow .18s!important;
}
.bsm:hover{transform:scale(1.08) translateY(-1px)!important;}

/* ── Inputs ── */
.inp{
  font-family:var(--kp-font)!important;
  background:rgba(6,10,20,.88)!important;
  border:1.5px solid rgba(255,255,255,.09)!important;
  color:#e8eef8!important;
  border-radius:10px!important;
  transition:border-color .2s,box-shadow .2s,background .2s!important;
}

.inp:focus{
  background:rgba(8,13,26,.92)!important;
  border-color:var(--kp-fire)!important;
  box-shadow:
    0 0 0 4px rgba(255,107,43,.14),
    0 2px 8px rgba(255,107,43,.10)!important;
}

.inp:hover:not(:focus){
  border-color:rgba(255,255,255,.16)!important;
}

/* ── Tables ── */
table{
  border-collapse:separate!important;
  border-spacing:0 5px!important;
  font-family:var(--kp-font)!important;
}

thead tr{
  position:sticky;top:0;z-index:5;
}

th{
  background:rgba(8,12,22,.92)!important;
  backdrop-filter:blur(12px);
  font-family:var(--kp-font)!important;
  font-size:10.5px!important;
  font-weight:700!important;
  letter-spacing:.08em!important;
  color:rgba(160,180,220,.65)!important;
  padding:10px 12px!important;
  border-bottom:1px solid rgba(255,255,255,.06)!important;
}

th:first-child{border-radius:10px 0 0 10px;}
th:last-child{border-radius:0 10px 10px 0;}

tbody tr{
  background:rgba(255,255,255,.022)!important;
  transition:
    background .2s var(--kp-ease),
    transform .2s var(--kp-ease),
    box-shadow .2s!important;
  border-radius:9px;
}

tbody tr:hover{
  background:rgba(255,107,43,.06)!important;
  transform:scale(1.003)!important;
  box-shadow:0 2px 12px rgba(0,0,0,.25)!important;
}

td{
  font-family:var(--kp-font)!important;
  font-size:13px!important;
  border:none!important;
  border-bottom:1px solid rgba(255,255,255,.03)!important;
  padding:10px 12px!important;
}

td:first-child{border-radius:9px 0 0 9px;}
td:last-child{border-radius:0 9px 9px 0;}

/* ── Monospace numbers ── */
.mn{font-family:var(--kp-mono)!important;letter-spacing:.01em;}

/* ── Tags / Badges ── */
.tag{
  font-family:var(--kp-font)!important;
  font-weight:700!important;
  font-size:10.5px!important;
  border-radius:20px!important;
  padding:3px 10px!important;
  background:rgba(255,107,43,.13)!important;
  border:1px solid rgba(255,107,43,.28)!important;
  color:#ffa46e!important;
  letter-spacing:.03em;
}

/* ── Top header bar ── */
.top-header{
  background:linear-gradient(90deg,
    rgba(8,12,22,.95) 0%,
    rgba(10,15,26,.90) 100%)!important;
  backdrop-filter:blur(20px) saturate(1.3);
  -webkit-backdrop-filter:blur(20px) saturate(1.3);
  border-bottom:1px solid rgba(255,255,255,.05)!important;
  box-shadow:0 2px 16px rgba(0,0,0,.4)!important;
}

/* ── Scrollbars ── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:rgba(0,0,0,.2);}
::-webkit-scrollbar-thumb{
  background:linear-gradient(180deg,var(--kp-fire),var(--kp-fire2))!important;
  border-radius:10px;
  box-shadow:0 0 6px rgba(255,107,43,.4);
}
*{scrollbar-color:var(--kp-fire) transparent!important;}

/* ── Modal ── */
.mo-box{
  background:linear-gradient(
    145deg,
    rgba(14,20,38,.98) 0%,
    rgba(9,13,26,.99) 100%
  )!important;
  border:1px solid rgba(255,255,255,.09)!important;
  box-shadow:
    0 24px 80px rgba(0,0,0,.7),
    0 0 0 1px rgba(255,107,43,.10),
    0 0 60px rgba(255,107,43,.06),
    inset 0 1px 0 rgba(255,255,255,.07)!important;
}

.mo-bg{backdrop-filter:blur(12px) saturate(1.2)!important;}

/* ── Toast notification ── */
.tst{
  font-family:var(--kp-font)!important;
  font-weight:700!important;
  background:rgba(14,20,38,.96)!important;
  border:1px solid rgba(255,107,43,.35)!important;
  box-shadow:0 8px 32px rgba(0,0,0,.5),0 0 20px rgba(255,107,43,.15)!important;
  border-radius:12px!important;
  backdrop-filter:blur(16px)!important;
}

/* ── KBD keyboard hints ── */
.kbd{
  font-family:var(--kp-mono)!important;
  background:rgba(255,107,43,.12)!important;
  border:1px solid rgba(255,107,43,.30)!important;
  color:#fb923c!important;
  border-radius:6px!important;
}

/* ── Stats cards — dashboard ── */
.sc{
  animation:none!important;
  border-radius:14px!important;
}

/* ── Stat card inner accent bar ── */
.sc::after{
  content:'';
  position:absolute;
  bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,
    transparent 0%,
    rgba(255,107,43,.5) 50%,
    transparent 100%);
  opacity:0;
  transition:opacity .3s;
}
.sc:hover::after{opacity:1;}

/* ── Page fade animation ── */
.fade{animation:kpPageReveal .32s var(--kp-ease) both!important;}

@keyframes kpPageReveal{
  from{opacity:0;transform:translateY(12px) scale(.995);}
  to{opacity:1;transform:translateY(0) scale(1);}
}

/* ── Row hover highlight ── */
.rr:hover{background:rgba(255,107,43,.05)!important;}

/* ── Active KB row ── */
.kb-active{
  background:rgba(255,107,43,.14)!important;
  border-left:3px solid var(--kp-fire)!important;
  box-shadow:inset 4px 0 12px rgba(255,107,43,.10)!important;
}

/* ── Sidebar footer buttons ── */
.desk-sidebar button[onclick^="sheet"],
.desk-sidebar button[onclick^="export"],
.desk-sidebar button[onclick^="import"],
.desk-sidebar button[onclick^="openDel"],
.desk-sidebar button[onclick^="openChange"],
.desk-sidebar button[onclick^="changePhoto"]{
  font-family:var(--kp-font)!important;
  font-size:11.5px!important;
  font-weight:600!important;
  border-radius:9px!important;
  transition:all .2s var(--kp-ease)!important;
}

/* ── Section headers ── */
[style*="font-weight:800"],[style*="font-weight:900"]{
  font-family:var(--kp-font)!important;
  letter-spacing:-.01em;
}

/* ── Number display ── */
[style*="font-size:28px"],[style*="font-size:26px"],[style*="font-size:24px"]{
  font-family:var(--kp-mono)!important;
  letter-spacing:-.02em;
}

/* ── Input placeholder ── */
.inp::placeholder{color:rgba(140,160,200,.4)!important;}

/* ── Focus ring ── */
:focus-visible{
  outline:2px solid rgba(255,107,43,.7)!important;
  outline-offset:2px!important;
  border-radius:6px;
}

/* ── Mobile bottom nav ── */
#mob-nav{
  background:rgba(8,12,22,.97)!important;
  backdrop-filter:blur(24px)!important;
  border-top:1px solid rgba(255,255,255,.06)!important;
  box-shadow:0 -4px 20px rgba(0,0,0,.5)!important;
}

/* ── Sync badge ── */
#sync-badge,#sync-badge-mob{
  font-family:var(--kp-font)!important;
  font-weight:700!important;
  font-size:11px!important;
  border-radius:8px!important;
}

/* ── Print ── */
@media print{
  .card,.sc{
    background:#fff!important;
    border:1px solid #ddd!important;
    box-shadow:none!important;
  }
}

</style>
</head>

const FB_URL='https://krushnnal-packing-default-rtdb.asia-southeast1.firebasedatabase.app/data.json';

function load(){
  try{const s=localStorage.getItem(SK);if(s)return JSON.parse(s);}catch(e){}
  return JSON.parse(JSON.stringify(DF));
}
let S=load();

function persist(){
  try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}
  clearTimeout(fbSyncTimeout);
  fbSyncTimeout=setTimeout(()=>fbPush(),600);
}

async function fbPush(){
  try{
    updateSyncBadge('syncing');
    const res=await fetch(FB_URL,{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(S)
    });
    if(res.ok){updateSyncBadge('synced');}
    else{updateSyncBadge('offline');}
  }catch(e){updateSyncBadge('offline');}
}

async function fbPull(){
  try{
    updateSyncBadge('syncing');
    const res=await fetch(FB_URL);
    if(res.ok){
      const d=await res.json();
      if(d&&d.inData&&d.outData){
        // Data same chhe to render NAHI karvo — screen jump nahi
        const newJson=JSON.stringify(d);
        const curJson=JSON.stringify(S);
        if(newJson!==curJson){
          S=d;
          try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}
          // Modal open hoy to render nahi — sirf data update
          if(!modal){
            render();
          }
        }
        updateSyncBadge('synced');
        return true;
      } else {
        await fbPush();
        return true;
      }
    }
  }catch(e){}
  updateSyncBadge('offline');
  return false;
}

function stk(){
  const all=[...new Set([...S.inData,...S.outData].map(r=>r.product))].sort();
  return all.map(p=>{
    const inR=S.inData.filter(r=>r.product===p);
    const outR=S.outData.filter(r=>r.product===p);
    const inPes=inR.reduce((s,r)=>s+r.pes,0);
    const inAmt=inR.reduce((s,r)=>s+r.pes*r.rate,0);
    // OUT pieces = pes+damage+short
    const outPes=outR.reduce((s,r)=>s+r.pes+(r.damage||0)+(r.short||0),0);
    // OUT amount = (pes+damage+short)*rate - stock ma thi badha pieces kadhi naakhvo
    const outAmt=outR.reduce((s,r)=>s+(r.pes+(r.damage||0)+(r.short||0))*r.rate,0);
    const balPes=inPes-outPes;
    // Stock value = inAmt - outAmt (outAmt includes damage+short)
    const balAmt=inAmt-outAmt;
    return {product:p,inPes,inAmt,outPes,outAmt,balPes,balAmt};
  });
}

document.addEventListener('keydown',e=>{
  const tag=document.activeElement.tagName;
  const typing=tag==='INPUT'||tag==='SELECT'||tag==='TEXTAREA';

  // ── F-Keys: always work globally ──
  if(e.key==='F1'){e.preventDefault();openAdd('product');showKbHint('F1 → Navo Product');return;}
  if(e.key==='F2'){e.preventDefault();openAdd('in');showKbHint('F2 → Maal Aavyo Entry');return;}
  if(e.key==='F3'){e.preventDefault();openAdd('out');showKbHint('F3 → Maal Gayo Entry');return;}
  if(e.key==='F4'){e.preventDefault();tab='report';render();showKbHint('F4 → Report');return;}
  if(e.key==='F5'){e.preventDefault();tab='dashboard';render();showKbHint('F5 → Dashboard');return;}
  if(e.key==='F6'){e.preventDefault();tab='stock';render();showKbHint('F6 → Stock');return;}
  if(e.key==='F7'){e.preventDefault();tab='search';render();setTimeout(()=>{const s=document.getElementById('main-search');if(s){s.focus();s.select&&s.select();}},80);showKbHint('F7 → Search');return;}
  if(e.key==='F8'){e.preventDefault();tab='products';render();showKbHint('F8 → Products');return;}
  if(e.key==='F9'){e.preventDefault();tab='in';render();showKbHint('F9 → Maal Aavyo List');return;}
  if(e.key==='F10'){e.preventDefault();tab='out';render();showKbHint('F10 → Maal Gayo List');return;}

  // ── Escape: 1 vaar press = badhu j band ──
  if(e.key==='Escape'){
    e.preventDefault();
    // Badha fixed popup remove karo (product history, delete modal, etc)
    document.querySelectorAll('div[style*="position:fixed"],div[style*="position: fixed"]').forEach(el=>{
      if(el.id==='toast'||el.id==='mob-overlay'||el.id==='mob-sidebar'||el.id==='kp-login'||el.id==='app'||el.id==='pa') return;
      el.remove();
    });
    // Modal band karo
    modal=null;
    confirmQ=null;
    // Tab → dashboard par pachha
    tab='dashboard';
    // kb-active clear
    document.querySelectorAll('.kb-active').forEach(r=>{r.classList.remove('kb-active');r.style.background='';r.style.borderLeft='';});
    render();
    showKbHint('Esc → Band');
    return;
  }

  // ── Confirm dialog: Enter=Ha, N=Na ──
  if(e.key==='Enter'&&confirmQ){e.preventDefault();confirmQ.onYes();return;}
  if((e.key==='n'||e.key==='N')&&confirmQ&&!typing){e.preventDefault();confirmQ=null;render();return;}

  // ── Ctrl shortcuts ──
  if(e.ctrlKey&&!e.altKey){
    if(e.key==='p'||e.key==='P'){e.preventDefault();if(tab==='report'&&typeof printRep==='function')printRep('both');showKbHint('Ctrl+P → Print Report');return;}
    if(e.key==='f'||e.key==='F'){e.preventDefault();tab='search';render();setTimeout(()=>{const s=document.getElementById('main-search');if(s){s.focus();s.select&&s.select();}},80);showKbHint('Ctrl+F → Search');return;}
    if(e.key==='n'||e.key==='N'){e.preventDefault();if(tab==='in')openAdd('in');else if(tab==='out')openAdd('out');else if(tab==='products')openAdd('product');else openAdd('in');showKbHint('Ctrl+N → Navi Entry');return;}
    if(e.key==='e'||e.key==='E'){e.preventDefault();const sel=document.querySelector('.kb-active');if(sel){const eb=sel.querySelector('[aria-label^="Edit"]');if(eb)eb.click();}showKbHint('Ctrl+E → Edit');return;}
    if(e.key==='d'||e.key==='D'){e.preventDefault();const sel=document.querySelector('.kb-active');if(sel){const db=sel.querySelector('[aria-label^="Delete"]');if(db)db.click();}showKbHint('Ctrl+D → Delete');return;}
    if(e.key==='Home'){e.preventDefault();tab='dashboard';render();showKbHint('Ctrl+Home → Dashboard');return;}
    return;
  }

  // ── Alt+Arrow = tab switch ──
  if(e.altKey){
    const tabs=['dashboard','in','out','stock','report','search','products'];
    if(e.key==='ArrowLeft'){e.preventDefault();const i=tabs.indexOf(tab);if(i>0){tab=tabs[i-1];render();showKbHint('Alt+← → Agalu Tab');}return;}
    if(e.key==='ArrowRight'){e.preventDefault();const i=tabs.indexOf(tab);if(i<tabs.length-1){tab=tabs[i+1];render();showKbHint('Alt+→ → Pachlu Tab');}return;}
    return;
  }

  // ── Modal Enter = field-by-field navigation ──
  if(e.key==='Enter'&&modal&&!e.shiftKey&&tag!=='BUTTON'){
    e.preventDefault();
    if(modal.type==='product'){
      const pn=document.getElementById('pname'),pr=document.getElementById('pinr'),ac=document.activeElement;
      if(ac===pn){if(pr)pr.focus();return;}
      saveProd();return;
    }
    if(modal.type==='product-rate'){saveRate();return;}
    const ac=document.activeElement;
    const mdEl=document.getElementById('md');
    const mpEl=document.getElementById('prod-num-inp');
    const mpeEl=document.getElementById('mpe');
    const mraEl=document.getElementById('mra');
    const mdmgEl=document.getElementById('mdmg');
    const mshrtEl=document.getElementById('mshrt');
    if(ac===mdEl){if(mpEl)mpEl.focus();return;}
    if(ac===mpEl||tag==='SELECT'){if(mpeEl)mpeEl.focus();return;}
    if(ac===mpeEl){
      if(modal.type==='out'&&mdmgEl){mdmgEl.focus();return;}
      if(modal.type==='in'&&mraEl){mraEl.focus();return;}
      saveM();return;
    }
    if(ac===mdmgEl){if(mshrtEl)mshrtEl.focus();return;}
    if(ac===mshrtEl){saveM();return;}
    if(ac===mraEl){saveM();return;}
    saveM();return;
  }

  // ── Tab inside modal = forward/back field navigation ──
  if(e.key==='Tab'&&modal){
    e.preventDefault();
    const ac=document.activeElement;
    const fwd=modal.type==='out'
      ?['md','prod-num-inp','mpe','mdmg','mshrt']
      :['md','prod-num-inp','mpe','mra'];
    const seq=e.shiftKey?[...fwd].reverse():fwd;
    const cur=fwd.indexOf(ac?.id);
    let next;
    if(!e.shiftKey){next=fwd[cur+1]||fwd[0];}
    else{next=fwd[cur-1]||fwd[fwd.length-1];}
    if(next){const el=document.getElementById(next);if(el){el.focus();setTimeout(()=>el.select&&el.select(),10);}}
    return;
  }

  // ── Arrow key row navigation ──
  if((e.key==='ArrowDown'||e.key==='ArrowUp')&&!modal&&!typing){
    e.preventDefault();
    // Active kb-row ni same table ma j navigate karo
    const active=document.querySelector('.kb-active');
    const parentTable=active?active.closest('table'):null;
    const rows=parentTable
      ?Array.from(parentTable.querySelectorAll('.kb-row'))
      :Array.from(document.querySelectorAll('.kb-row'));
    if(!rows.length)return;
    let cur=-1;rows.forEach((r,i)=>{if(r.classList.contains('kb-active'))cur=i;});
    rows.forEach(r=>{r.classList.remove('kb-active');r.style.background='';r.style.borderLeft='';});
    if(e.key==='ArrowDown')cur=Math.min(cur+1,rows.length-1);
    else cur=Math.max(cur-1,0);
    if(cur<0)cur=0;
    const sel=rows[cur];
    if(sel){sel.classList.add('kb-active');sel.style.background='rgba(249,115,22,0.2)';sel.style.borderLeft='3px solid var(--orange)';sel.scrollIntoView({block:'nearest',behavior:'smooth'});searchIdx=cur;}
    return;
  }

  // ── Home/End = first/last row ──
  if((e.key==='Home'||e.key==='End')&&!modal&&!typing){
    e.preventDefault();
    const active=document.querySelector('.kb-active');
    const parentTable=active?active.closest('table'):null;
    const rows=parentTable
      ?Array.from(parentTable.querySelectorAll('.kb-row'))
      :Array.from(document.querySelectorAll('.kb-row'));
    if(!rows.length)return;
    rows.forEach(r=>{r.classList.remove('kb-active');r.style.background='';r.style.borderLeft='';});
    const sel=e.key==='Home'?rows[0]:rows[rows.length-1];
    if(sel){sel.classList.add('kb-active');sel.style.background='rgba(249,115,22,0.2)';sel.style.borderLeft='3px solid var(--orange)';sel.scrollIntoView({block:'nearest',behavior:'smooth'});}
    return;
  }

  // ── PageDown/PageUp = 10 rows jump ──
  if((e.key==='PageDown'||e.key==='PageUp')&&!modal&&!typing){
    e.preventDefault();
    const active=document.querySelector('.kb-active');
    const parentTable=active?active.closest('table'):null;
    const rows=parentTable
      ?Array.from(parentTable.querySelectorAll('.kb-row'))
      :Array.from(document.querySelectorAll('.kb-row'));
    if(!rows.length)return;
    let cur=-1;rows.forEach((r,i)=>{if(r.classList.contains('kb-active'))cur=i;});
    rows.forEach(r=>{r.classList.remove('kb-active');r.style.background='';r.style.borderLeft='';});
    cur=e.key==='PageDown'?Math.min(cur+10,rows.length-1):Math.max(cur-10,0);
    if(cur<0)cur=0;
    const sel=rows[cur];
    if(sel){sel.classList.add('kb-active');sel.style.background='rgba(249,115,22,0.2)';sel.style.borderLeft='3px solid var(--orange)';sel.scrollIntoView({block:'nearest',behavior:'smooth'});searchIdx=cur;}
    return;
  }

  // ── Enter on highlighted row = Edit ──
  if(e.key==='Enter'&&!modal&&!confirmQ){
    const sel=document.querySelector('.kb-active');
    if(sel){e.preventDefault();const eb=sel.querySelector('[aria-label^="Edit"]');if(eb)eb.click();return;}
  }

  // ── Delete key = delete highlighted row ──
  if(e.key==='Delete'&&!modal&&!confirmQ&&!typing){
    const sel=document.querySelector('.kb-active');
    if(sel){e.preventDefault();const db=sel.querySelector('[aria-label^="Delete"]');if(db)db.click();return;}
  }

  // ── Number keys for tab (when not typing) ──
  if(typing)return;
  const m={'1':'dashboard','2':'in','3':'out','4':'stock','5':'report','6':'search','7':'products'};
  if(m[e.key]){tab=m[e.key];render();showKbHint(e.key+' → Tab switch');}
});

    requestAnimationFrame(()=>{
      const ca=document.getElementById('content-area')||document.querySelector('.content-area');
      if(ca&&_sc>0)ca.scrollTop=_sc;
      if(_win>0)window.scrollTo(0,_win);
      // Modal input focus restore
      const mfocus=document.getElementById(_modalActiveId||'');
      if(mfocus){mfocus.focus();try{if(mfocus.setSelectionRange)mfocus.setSelectionRange(_modalActiveSel,_modalActiveSel);}catch(e){}}
      else{
        // Default: pahela input focus karo
        const mf=document.querySelector('.modal-box input, .modal-box select');
        if(mf)mf.focus();
      }
      setupDashProdNav();
      setupKbRows();
    });
  } else {
    requestAnimationFrame(()=>{
      const ca=document.getElementById('content-area')||document.querySelector('.content-area');
      if(ca&&_sc>0)ca.scrollTop=_sc;
      if(_win>0)window.scrollTo(0,_win);
      setupDashProdNav();
      setupKbRows();
    });
  }
}

function setupKbRows(){
  document.querySelectorAll('.kb-row').forEach(row=>{
    row.addEventListener('click',function(){
      // Badhaj kb-active remove karo
      document.querySelectorAll('.kb-active').forEach(r=>{
        r.classList.remove('kb-active');r.style.background='';r.style.borderLeft='';
      });
      this.classList.add('kb-active');
      this.style.background='rgba(249,115,22,0.2)';
      this.style.borderLeft='3px solid var(--orange)';
    });
    row.addEventListener('focus',function(){
      // Focus pan same kaam kare
      document.querySelectorAll('.kb-active').forEach(r=>{
        r.classList.remove('kb-active');r.style.background='';r.style.borderLeft='';
      });
      this.classList.add('kb-active');
      this.style.background='rgba(249,115,22,0.2)';
      this.style.borderLeft='3px solid var(--orange)';
    });
  });
}

function body(stock){

// ═══ UNIVERSAL SMART PRODUCT SEARCH DROPDOWN ═══
function smartProductFilter(q){
  if(!q||!q.trim()) return S.products;
  const lq=q.trim().toLowerCase();
  return S.products.filter(p=>{
    const last=p.name.trim().split(' ').pop().toLowerCase();
    const nums=(p.name.match(/\d+/g)||[]);
    return last.startsWith(lq)||p.name.toLowerCase().includes(lq)||nums.some(n=>n.startsWith(lq));
  });
}
function buildFilterDD(matches,onSelectFn){
  if(!matches.length) return '<div style="padding:10px 14px;font-size:13px;color:var(--muted);">❌ Koi product nathi</div>';
  return matches.map((p,i)=>{
    const safe=p.name.replace(/\\/g,'\\\\').replace(/\'/g,"\\'");
    const last=p.name.trim().split(' ').pop();
    return `<div class="fdd-item" data-idx="${i}" data-name="${p.name.replace(/"/g,'&quot;')}"
      style="padding:9px 13px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border);color:var(--text);transition:background .1s;display:flex;align-items:center;justify-content:space-between;"
      onmouseenter="this.style.background='rgba(249,115,22,0.18)';this.style.color='var(--orange)'"
      onmouseleave="this.style.background='';this.style.color='var(--text)'"
      onclick="${onSelectFn}('${safe}')">
      <span>${p.name}</span>
      <span style="font-size:10px;color:var(--orange);font-weight:700;background:rgba(249,115,22,0.15);padding:1px 7px;border-radius:10px;flex-shrink:0;margin-left:8px;">${last}</span>
    </div>`;
  }).join('');
}

// Active dropdown tracker for arrow key nav
let _fddActive={ddid:null,idx:-1};

function showFilterDD(val,ddid,onSelectFn){
  const dd=document.getElementById(ddid);
  if(!dd) return;
  if(!val||!val.trim()){dd.style.display='none';_fddActive={ddid:null,idx:-1};return;}
  const matches=smartProductFilter(val);
  dd.innerHTML=buildFilterDD(matches,onSelectFn);
  dd.style.display=matches.length?'block':'none';
  _fddActive={ddid,idx:-1};
}

function fddHighlight(ddid,idx){
  const dd=document.getElementById(ddid);
  if(!dd) return;
  const items=dd.querySelectorAll('.fdd-item');
  if(!items.length) return;
  if(idx<0) idx=0;
  if(idx>=items.length) idx=items.length-1;
  items.forEach((el,i)=>{
    if(i===idx){el.style.background='rgba(249,115,22,0.25)';el.style.color='var(--orange)';el.scrollIntoView({block:'nearest',behavior:'smooth'});}
    else{el.style.background='';el.style.color='var(--text)';}
  });
  _fddActive.idx=idx;
}

function fddEnterSelect(){
  if(!_fddActive.ddid) return false;
  const dd=document.getElementById(_fddActive.ddid);
  if(!dd||dd.style.display==='none') return false;
  const items=dd.querySelectorAll('.fdd-item');
  if(_fddActive.idx<0||!items[_fddActive.idx]) return false;
  const name=items[_fddActive.idx].getAttribute('data-name');
  if(!name) return false;
  const id=_fddActive.ddid;
  if(id==='in-fbar-dd') fBarSelectProd(name,'in');
  else if(id==='out-fbar-dd') fBarSelectProd(name,'out');
  else if(id==='stk-dd') stkSelectProd(name);
  else if(id==='prodtab-dd') prodTabSelectProd(name);
  else if(id==='srch-dd') srchTabSelectProd(name);
  else if(id==='rep-in-dd'){repInF.p=name;repInF.q='';dd.style.display='none';render();}
  else if(id==='rep-out-dd'){repOutF.p=name;repOutF.q='';dd.style.display='none';render();}
  _fddActive={ddid:null,idx:-1};
  return true;
}

// Arrow key listener for all filter dropdowns
document.addEventListener('keydown',function(e){
  if(!_fddActive.ddid) return;
  const dd=document.getElementById(_fddActive.ddid);
  if(!dd||dd.style.display==='none'){_fddActive={ddid:null,idx:-1};return;}
  if(e.key==='ArrowDown'){e.preventDefault();fddHighlight(_fddActive.ddid,_fddActive.idx+1);}
  else if(e.key==='ArrowUp'){e.preventDefault();fddHighlight(_fddActive.ddid,_fddActive.idx-1);}
  else if(e.key==='Enter'){if(fddEnterSelect()) e.preventDefault();}
  else if(e.key==='Escape'){dd.style.display='none';_fddActive={ddid:null,idx:-1};}
},true);

        autocomplete="off">

function entHTML(type){

var _repRenderTimer={in:null,out:null};

function repSearchInput(inp,key,ddid){
  const val=inp.value.trim().toLowerCase();
  const curVal=inp.value;
  const curPos=inp.selectionStart;
  const fkey=key==='repInF'?'in':'out';
  window[key].q=curVal;
  window[key].p=''; // Clear product filter when typing manually

  // render() karvo filter maate, pachi focus+value restore karvo
  clearTimeout(_repRenderTimer[fkey]);
  _repRenderTimer[fkey]=setTimeout(()=>{
    render();
    // Render pachhi same input restore karo
    const sid='rep-'+(fkey)+'-si';
    const newInp=document.getElementById(sid);
    if(newInp){
      newInp.value=curVal;
      newInp.focus();
      try{newInp.setSelectionRange(curPos,curPos);}catch(e){}
      // Dropdown pan show karo
      if(val){
        const matches=S.products.filter(p=>p.name.toLowerCase().includes(val)||
          (p.name.match(/\d+/g)||[]).some(n=>n.startsWith(val)));
        const dd=document.getElementById(ddid);
        if(dd&&matches.length>0){
          _repDDIdx[fkey]=-1;
          dd.innerHTML=matches.slice(0,10).map((p,i)=>
            `<div data-name="${p.name}" data-idx="${i}" onclick="repSelectProd(this,'${key}','${ddid}')"
            style="padding:8px 12px;cursor:pointer;font-size:13px;color:var(--text);border-bottom:1px solid var(--border);"
            onmouseover="repHoverDD(this,'${ddid}')">${p.name}</div>`).join('');
          dd.style.display='block';
        } else if(dd){
          dd.style.display='none';
        }
      }
    }
  },80);
}

function repFocusShow(inp,key,ddid){
  const val=inp.value.trim().toLowerCase();
  if(!val)return;
  const fkey=key==='repInF'?'in':'out';
  const matches=S.products.filter(p=>p.name.toLowerCase().includes(val)||

function repHoverDD(el,ddid){

}

function repSelectProd(el,key,ddid){
  const name=el.getAttribute('data-name');
  window[key].q=name;
  window[key].p=''; // q thi j filter karvo
  const dd=document.getElementById(ddid);
  if(dd)dd.style.display='none';
  const fkey=key==='repInF'?'in':'out';
  clearTimeout(_repRenderTimer[fkey]);
  render();
  // Render pachhi input value set karo
  setTimeout(()=>{
    const sid='rep-'+fkey+'-si';

    if(inp){inp.value=name;}

function repSearchKey(e,key,ddid,sid){
  const fkey=key==='repInF'?'in':'out';
  const dd=document.getElementById(ddid);
  if(!dd||dd.style.display==='none'){
    if(e.key==='Enter'){
      window[key].q=document.getElementById(sid).value;
      clearTimeout(_repRenderTimer[fkey]);
      render();
    }
    return;
  }
  const items=dd.querySelectorAll('div');
  if(e.key==='ArrowDown'){
    e.preventDefault();
    _repDDIdx[fkey]=Math.min(_repDDIdx[fkey]+1,items.length-1);
    items.forEach((d,i)=>{
      d.style.background=i===_repDDIdx[fkey]?'rgba(249,115,22,0.25)':'';
      d.style.color=i===_repDDIdx[fkey]?'var(--orange)':'var(--text)';
    });
    if(items[_repDDIdx[fkey]])items[_repDDIdx[fkey]].scrollIntoView({block:'nearest'});
  } else if(e.key==='ArrowUp'){
    e.preventDefault();
    _repDDIdx[fkey]=Math.max(_repDDIdx[fkey]-1,-1);
    items.forEach((d,i)=>{
      d.style.background=i===_repDDIdx[fkey]?'rgba(249,115,22,0.25)':'';
      d.style.color=i===_repDDIdx[fkey]?'var(--orange)':'var(--text)';
    });
  } else if(e.key==='Enter'){
    e.preventDefault();
    if(_repDDIdx[fkey]>=0&&items[_repDDIdx[fkey]]){
      repSelectProd(items[_repDDIdx[fkey]],key,ddid);
    } else {
      window[key].q=document.getElementById(sid).value;
      dd.style.display='none';
      clearTimeout(_repRenderTimer[fkey]);
      render();
    }
  } else if(e.key==='Escape'){
    dd.style.display='none';_repDDIdx[fkey]=-1;
  }
}

function getRepRows(f,type){
  let rows=[...(type==='in'?S.inData:S.outData)].sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id);
  if(f.d) rows=rows.filter(r=>r.date===f.d);
  else if(f.m) rows=rows.filter(r=>r.date.startsWith(f.m));
  if(f.p) rows=rows.filter(r=>r.product===f.p);
  if(f.q){const q=f.q.trim().toLowerCase();rows=rows.filter(r=>{const nm=r.product.toLowerCase();const nums=r.product.match(/\d+/g)||[];return nm.includes(q)||nums.some(n=>n.startsWith(q)||n===q);});}
  return rows;
}

let srchMonth='', srchType='both', srchCalYear=new Date().getFullYear(), srchCalOpen=false;

function searchHTML(stock){
  const q=searchQ.trim().toLowerCase();
  const MNS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const MNFL=['January','February','March','April','May','June','July','August','September','October','November','December'];
  function fMonthFull(m){const[y,mo]=m.split('-');return MNFL[parseInt(mo)-1]+' '+y;}

  // All years with data
  const allYears=[...new Set([...S.inData,...S.outData].map(r=>r.date.slice(0,4)))].map(Number).sort((a,b)=>b-a);
  const minY=allYears.length?Math.min(...allYears):srchCalYear;
  const maxY=allYears.length?Math.max(...allYears):srchCalYear;

  function hasDataInMonth(ym){
    return S.inData.some(r=>r.date.startsWith(ym))||S.outData.some(r=>r.date.startsWith(ym));
  }
  function countInMonth(ym,type){
    const inC=S.inData.filter(r=>r.date.startsWith(ym)).length;
    const outC=S.outData.filter(r=>r.date.startsWith(ym)).length;
    if(type==='in') return inC; if(type==='out') return outC; return inC+outC;
  }

  const matchProd=(name)=>{
    const nm=name.toLowerCase();
    const nums=name.match(/\d+/g)||[];
    return !q||(nm.includes(q)||nums.some(n=>n.startsWith(q)||n===q));
  };

  // Filter by month and type first, then by query
  let inPool=srchMonth?S.inData.filter(r=>r.date.startsWith(srchMonth)):S.inData;
  let outPool=srchMonth?S.outData.filter(r=>r.date.startsWith(srchMonth)):S.outData;
  if(srchType==='out') inPool=[];
  if(srchType==='in') outPool=[];

  const inR=(q||srchMonth)?inPool.filter(r=>matchProd(r.product)||(!srchMonth&&r.date.includes(q))):[];
  const outR=(q||srchMonth)?outPool.filter(r=>matchProd(r.product)||(!srchMonth&&r.date.includes(q))):[];

  // Stock summary filtered by month
  let sR=[];
  if(q||srchMonth){
    sR=stock.filter(r=>matchProd(r.product)).map(r=>{
      if(!srchMonth) return r;
      const inPes=inPool.filter(x=>x.product===r.product).reduce((s,x)=>s+x.pes,0);
      const outPes=outPool.filter(x=>x.product===r.product).reduce((s,x)=>s+x.pes+(x.damage||0)+(x.short||0),0);
      const inAmt=inPool.filter(x=>x.product===r.product).reduce((s,x)=>s+x.pes*x.rate,0);
      const outAmt=outPool.filter(x=>x.product===r.product).reduce((s,x)=>s+x.pes*x.rate,0);
      return {...r,inPes,outPes,balPes:inPes-outPes,inAmt,outAmt};
    }).filter(r=>r.inPes>0||r.outPes>0);
  }

  const hasFilter=q||srchMonth;
  const noResults=hasFilter&&!inR.length&&!outR.length&&!sR.length;

  // Calendar grid HTML
  const calGrid=`
  <div style="background:var(--surface);border:1.5px solid ${srchCalOpen?'var(--orange)':'var(--border2)'};border-radius:12px;overflow:hidden;">
    <!-- Calendar toggle button -->
    <div onclick="srchCalOpen=!srchCalOpen;render()" style="padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:${srchMonth?'rgba(249,115,22,0.1)':'var(--surface)'};" onmouseover="this.style.background='#161d2e'" onmouseout="this.style.background='${srchMonth?'rgba(249,115,22,0.1)':'var(--surface)'}'">
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="color:var(--orange);">${IC.calendar}</span>
        <span style="font-weight:700;font-size:13px;color:${srchMonth?'var(--orange)':'var(--muted)'};">${srchMonth?fMonthFull(srchMonth):'Mahino Select Karo'}</span>
        ${srchMonth?`<span style="font-size:11px;color:var(--muted);">(${countInMonth(srchMonth,'both')} entries)</span>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        ${srchMonth?`<button onclick="event.stopPropagation();srchMonth='';srchCalOpen=false;render()" style="background:#7f1d1d33;border:1px solid #ef444444;color:#f87171;border-radius:6px;padding:2px 8px;cursor:pointer;font-size:11px;font-weight:700;">✕ Clear</button>`:''}
        <span style="color:var(--muted);font-size:11px;">${srchCalOpen?'▲':'▼'}</span>
      </div>
    </div>
    ${srchCalOpen?`
    <div style="padding:12px;border-top:1px solid var(--border2);">
      <!-- Year nav -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">

    </tr>`;}).join('')}</tbody>

function updAmt(){
  const p=Number(document.getElementById('mpe')?.value||0),r=Number(document.getElementById('mra')?.value||0);
  const el=document.getElementById('mamt');if(el)el.textContent=inr(p*r);
}

function updNet(){
  const p=Number(document.getElementById('mpe')?.value||0);
  const dmg=Number(document.getElementById('mdmg')?.value||0);
  const shrt=Number(document.getElementById('mshrt')?.value||0);
  const el=document.getElementById('mnet');if(el)el.textContent=num(p+dmg+shrt);
  // Update breakdown
  const breakdown=document.getElementById('mnet')?.parentElement?.querySelector('div:last-child');
  if(breakdown)breakdown.textContent=`Piece: ${p} + Damage: ${dmg} + Short: ${shrt}`;
}

function autoRate(productName){
  if(!modal)return;
  const rate=getProdRate(productName,modal.type);
  if(rate){
    modal.data.rate=String(rate);
    const el=document.getElementById('mra');
    if(el){el.value=rate;updAmt();}
  }
}

function openAdd(type){
  if(type==='product'){
    modal={type:'product',mode:'add',data:{name:'',rate:''}};
    render();setTimeout(()=>document.getElementById('pname')?.focus(),50);return;
  }
  modal={type,mode:'add',data:{date:tod(),product:'',pes:'',rate:''}};
  render();setTimeout(()=>document.getElementById('prod-num-inp')?.focus(),60);
}

function openEdit(type,id){
  const row=(type==='in'?S.inData:S.outData).find(r=>r.id===id);if(!row)return;
  modal={type,mode:'edit',data:{...row,pes:String(row.pes),rate:String(row.rate)}};
  render();setTimeout(()=>document.getElementById('md')?.focus(),50);
}

function editProd(idx){
  const p=S.products[idx];
  modal={type:'product-rate',pidx:idx,data:{name:p.name,rate:p.rate||p.inRate||''}};
  render();setTimeout(()=>document.getElementById('pinr')?.focus(),50);
}

function saveM(){
  const d=modal.data;
  // Out entry ma pes=0 chalne de jyare damage ya short hoy
  const pesOk = modal.type==='out' ? (Number(d.pes||0)+Number(d.damage||0)+Number(d.short||0))>0 : !!d.pes;
  if(!d.date||!d.product||!pesOk||!d.rate){toast('Badhaj fields bharo!','#f97316');return;}
  const row={date:d.date,product:d.product,pes:Number(d.pes||0),rate:Number(d.rate)};
  if(modal.type==='out'){
    row.damage=Number(d.damage||0);
    row.short=Number(d.short||0);
  }
  if(modal.type==='in'){
    if(modal.mode==='add'){row.id=S.nextInId++;S.inData.push(row);}
    else{row.id=d.id;S.inData=S.inData.map(r=>r.id===row.id?row:r);}
  } else {
    if(modal.mode==='add'){row.id=S.nextOutId++;S.outData.push(row);}
    else{row.id=d.id;S.outData=S.outData.map(r=>r.id===row.id?row:r);}
  }
  persist();
  const _st=modal.type, _sd=modal.data.date;
  toast('Entry save thayi!');
  // Turant j navi entry open karo — no delay, no click needed
  modal={type:_st,mode:'add',data:{date:_sd,product:'',pes:'',rate:'',damage:'',short:''}};
  render();
  // Product number field par focus karo — date par nahi
  setTimeout(()=>{
    const pf=document.getElementById('prod-num-inp');
    if(pf){pf.focus();}
  },60);
}

function changePhoto(){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';
  inp.onchange=function(e){
    const file=e.target.files[0];
    if(!file)return;
    if(file.size>2*1024*1024){toast('Photo 2MB thi nani hovi joiye!','#f97316');return;}
    const reader=new FileReader();
    reader.onload=async function(ev){
      const b64=ev.target.result;
      window._KPIMG=b64;
      localStorage.setItem('_KP_CUSTOM_IMG',b64);
      toast('Photo save thay chhe... ⏳','#fbbf24');
      try{
        // Save to Firebase
        const PHOTO_URL=FB_URL.replace('/data.json','/photo.json');
        await fetch(PHOTO_URL,{
          method:'PUT',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify(b64)
        });
        render();
        toast('✅ Photo badhe change thayi!','#34d399');
      }catch(err){
        render();
        toast('Photo local change thayi!','#fbbf24');
      }
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

// Load photo from Firebase on startup
async function loadPhotoFromFB(){
  try{
    const PHOTO_URL=FB_URL.replace('/data.json','/photo.json');
    const res=await fetch(PHOTO_URL);
    if(res.ok){
      const b64=await res.json();
      if(b64&&b64.startsWith('data:image')){
        // Photo same chhe to render j nahi karvo
        if(window._KPIMG===b64)return;
        window._KPIMG=b64;
        localStorage.setItem('_KP_CUSTOM_IMG',b64);
        // Modal open hoy to render nahi
        if(modal)return;
        const _ae=document.activeElement;
        const _aeid=_ae?_ae.id:'';
        const _aesel=_ae&&_ae.selectionStart!==undefined?_ae.selectionStart:null;
        render();
        if(_aeid){
          const el=document.getElementById(_aeid);
          if(el){el.focus();if(_aesel!==null&&el.setSelectionRange){try{el.setSelectionRange(_aesel,_aesel);}catch(e){}}}
        }
      }
    }
  }catch(e){}
}
// Call on start - load local first then Firebase
(function(){
  const saved=localStorage.getItem('_KP_CUSTOM_IMG');
  if(saved)window._KPIMG=saved;
  else window._KPIMG=_KPIMG;
  // Load from Firebase after short delay
  setTimeout(loadPhotoFromFB,2000);
})();

function saveProd(){
  const d=modal.data;
  const n=d.name?.trim();
  if(!n){toast('Product naam lakhvo!','#f97316');return;}
  if(S.products.find(p=>p.name===n)){toast('Product pahela thi chhe!','#f97316');return;}
  const r=parseFloat(d.rate)||0;
  S.products.push({name:n,rate:r,inRate:r,outRate:r});
  persist();modal=null;toast('Product + Rate save thayu!');render();
}

function updateProd(){saveRate();}
function saveRate(){
  const d=modal.data,idx=modal.pidx;
  if(idx==null||idx===undefined){toast('Error!','#ef4444');return;}
  const oldName=S.products[idx].name;
  const newName=d.name?.trim()||oldName;
  if(!newName){toast('Product naam lakhvo!','#f97316');return;}
  // Check duplicate name (except self)
  if(newName!==oldName && S.products.find((p,i)=>p.name===newName&&i!==idx)){toast('Aa naam pahela thi chhe!','#f97316');return;}
  const r=parseFloat(d.rate)||0;
  S.products[idx].name=newName;
  S.products[idx].rate=r;
  S.products[idx].inRate=r;
  S.products[idx].outRate=r;
  // Update entries with new name
  if(newName!==oldName){
    S.inData=S.inData.map(row=>row.product===oldName?{...row,product:newName}:row);
    S.outData=S.outData.map(row=>row.product===oldName?{...row,product:newName}:row);
  }
  persist();modal=null;toast('Product save thayun! ✓');render();
}

function askDel(type,id){
  confirmQ={msg:'Entry delete karvu chhe?',onYes:()=>{
    if(type==='in')S.inData=S.inData.filter(r=>r.id!==id);
    else S.outData=S.outData.filter(r=>r.id!==id);
    persist();confirmQ=null;toast('Delete thayi!','#ef4444');render();
  }};render();
}

function askDelProd(name){
  const has=S.inData.some(r=>r.product===name)||S.outData.some(r=>r.product===name);
  confirmQ={msg:`"${name}" delete karvu chhe?`+(has?' Entries pan chhe!':''),
    onYes:()=>{S.products=S.products.filter(p=>p.name!==name);persist();confirmQ=null;toast('Product delete!','#ef4444');render();}};
  render();
}

// Helper: YYYY-MM string N months pehla
function monthsAgo(n){
  const d=new Date();
  d.setDate(1);
  d.setMonth(d.getMonth()-n);
  return d.toISOString().slice(0,7);
}

// Helper: cutoff thi PEHLA ni badhij entries
function countOlderThan(cutoff,type){
  const inC=S.inData.filter(r=>r.date.slice(0,7)<cutoff).length;
  const outC=S.outData.filter(r=>r.date.slice(0,7)<cutoff).length;
  if(type==='in') return inC;
  if(type==='out') return outC;
  return inC+outC;
}

// Quick delete: N mahina juna data
function confirmDelOlder(){
  if(!delSelMonth||!delSelMonth.startsWith('__older_')) return;
  const n=parseInt(delSelMonth.replace('__older_','').replace('__',''));
  const cut=monthsAgo(n);
  const monthNames={'01':'January','02':'February','03':'March','04':'April','05':'May','06':'June','07':'July','08':'August','09':'September','10':'October','11':'November','12':'December'};
  function fMonthF(m){const[y,mo]=m.split('-');return (monthNames[mo]||mo)+' '+y;}
  const inC=S.inData.filter(r=>r.date.slice(0,7)<cut).length;
  const outC=S.outData.filter(r=>r.date.slice(0,7)<cut).length;
  const tot=inC+outC;
  if(tot===0){toast('Koi data nathi delete karva!','#f97316');return;}
  confirmQ={

function confirmDelMonth(){
  if(!delSelMonth||delSelMonth.startsWith('__')) return;
  const monthNames={'01':'January','02':'February','03':'March','04':'April','05':'May','06':'June','07':'July','08':'August','09':'September','10':'October','11':'November','12':'December'};
  const [y,mo]=delSelMonth.split('-');
  const fMonth=(monthNames[mo]||mo)+' '+y;
  const inC=S.inData.filter(r=>r.date.startsWith(delSelMonth)).length;
  const outC=S.outData.filter(r=>r.date.startsWith(delSelMonth)).length;
  let totalToDelete=delSelType==='both'?inC+outC:delSelType==='in'?inC:outC;
  confirmQ={
    msg:`${fMonth} — ${totalToDelete} entries delete karvu chhe? (${delSelType==='both'?'IN+OUT':delSelType==='in'?'Faqt IN':'Faqt OUT'})`,
    onYes:()=>{
      if(delSelType==='in'||delSelType==='both') S.inData=S.inData.filter(r=>!r.date.startsWith(delSelMonth));
      if(delSelType==='out'||delSelType==='both') S.outData=S.outData.filter(r=>!r.date.startsWith(delSelMonth));
      persist();confirmQ=null;closeDelModal();
      toast(`${fMonth} — ${totalToDelete} entries delete thayi!`,'#ef4444');render();
    }
  };
  closeDelModal();render();
}

// ── Product dropdown with Arrow key navigation ──
let ddIdx=-1;

function prodNumSearch(val){
  if(!modal)return;
  ddIdx=-1;
  const q=val.trim().toLowerCase();
  const dd=document.getElementById('prod-dropdown');
  if(!dd)return;
  if(!q){
    dd.style.display='none';
    // Clear selected label if input cleared
    const lbl=document.getElementById('prod-selected-lbl');
    if(lbl){lbl.style.display='none';lbl.textContent='';}
    if(modal)modal.data.product='';
    const inp=document.getElementById('prod-num-inp');
    if(inp)inp.style.borderColor='';
    return;
  }

  const filtered=S.products.filter(p=>{
    const last=p.name.trim().split(' ').pop().toLowerCase();
    return last.startsWith(q)||p.name.toLowerCase().includes(q);
  });

  if(!filtered.length){
    dd.innerHTML='<div style="padding:10px 14px;font-size:13px;color:var(--muted);">❌ "'+val+'" — koi product nathi maldo</div>';
    dd.style.display='block';
    return;
  }

  dd.innerHTML=filtered.map((p,i)=>{
    const safe=p.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    // Highlight matching part
    const last=p.name.trim().split(' ').pop();
    return '<div class="dd-item" data-idx="'+i+'" data-name="'+p.name.replace(/"/g,'&quot;')+'" '+
      'style="padding:10px 14px;cursor:pointer;font-size:14px;border-bottom:1px solid var(--border);color:var(--text);transition:background .1s;display:flex;align-items:center;justify-content:space-between;" '+
      'onmouseenter="ddHover(this)" onmouseleave="ddUnhover(this)" '+
      'onclick="selectProd(\''+safe+'\')">'+
      '<span>'+p.name+'</span>'+
      '<span style="font-size:11px;color:var(--orange);font-weight:700;background:rgba(249,115,22,0.15);padding:2px 8px;border-radius:12px;">'+last+'</span>'+
      '</div>';
  }).join('');
  dd.style.display='block';

  // Auto-select ONLY when exactly 1 product matches AND it's an exact number match
  // Never auto-select if multiple products match — user must choose from dropdown
  if(filtered.length===1){
    const exactLast=filtered[0].name.trim().split(' ').pop().toLowerCase();
    if(exactLast===q){
      selectProd(filtered[0].name);
    }
  }
  // If multiple match same number (same last word), DO NOT auto-select — show dropdown for user to pick
}

function ddHover(el){
  document.querySelectorAll('.dd-item').forEach(i=>{i.style.background='';i.style.color='var(--text)';});
  el.style.background='rgba(249,115,22,0.2)';
  el.style.color='var(--orange)';
  ddIdx=parseInt(el.getAttribute('data-idx'));
}
function ddUnhover(el){
  if(ddIdx!==parseInt(el.getAttribute('data-idx'))){
    el.style.background='';el.style.color='var(--text)';
  }
}

function ddHighlight(idx){
  const items=document.querySelectorAll('.dd-item');
  if(!items.length)return;
  items.forEach(i=>{i.style.background='';i.style.color='var(--text)';});
  if(idx<0)idx=0;
  if(idx>=items.length)idx=items.length-1;
  ddIdx=idx;
  items[ddIdx].style.background='rgba(249,115,22,0.22)';
  items[ddIdx].style.color='var(--orange)';
  items[ddIdx].scrollIntoView({block:'nearest',behavior:'smooth'});
}

function handleProdKey(e){
  const dd=document.getElementById('prod-dropdown');
  const items=document.querySelectorAll('.dd-item');
  if(!dd||dd.style.display==='none'||!items.length)return;
  if(e.key==='ArrowDown'){
    e.preventDefault();
    ddHighlight(ddIdx+1);
  } else if(e.key==='ArrowUp'){
    e.preventDefault();
    if(ddIdx<=0){
      ddIdx=-1;
      items.forEach(i=>{i.style.background='';i.style.color='var(--text)';});
    } else {
      ddHighlight(ddIdx-1);
    }
  } else if(e.key==='Enter'){
    e.preventDefault();
    if(ddIdx>=0&&items[ddIdx]){
      const name=items[ddIdx].getAttribute('data-name');
      if(name)selectProd(name);
    }
  } else if(e.key==='Escape'){
    dd.style.display='none';ddIdx=-1;
  }
}

function selectProd(name){
  if(!modal)return;
  modal.data.product=name;
  const inp=document.getElementById('prod-num-inp');
  if(inp){
    inp.value=name.trim().split(' ').pop();
    inp.style.borderColor='var(--green)';
  }
  const lbl=document.getElementById('prod-selected-lbl');
  if(lbl){lbl.textContent=name;lbl.style.display='block';}
  const dd=document.getElementById('prod-dropdown');
  if(dd){dd.style.display='none';}
  ddIdx=-1;
  autoRate(name);
  setTimeout(()=>document.getElementById('mpe')?.focus(),80);
}

  for(var i=0;i<4;i++){
    var d=document.getElementById('kpnd'+i);
    if(!d) return;
    d.textContent=i<kpNVal.length?'●':'';
    d.style.borderColor=i<kpNVal.length?'#f97316':'#232f45';
  }
}
function kpnSave(){
  localStorage.setItem(KP_PASS_KEY,kpNVal);
  kpNVal='';
  var s=document.getElementById('kp-chpass');
  if(s) s.remove();
  toast('Password change thayun!');
}
